type: vertical-stack
cards:
  # ===== HEADER =====
  - type: markdown
    content: >-
      # ⛽ Preț Carburant București

      ---
      🏪 **{{ state_attr('sensor.benzina_standard_95_bucuresti', 'station_count') }}** benzinării monitorizate
      | 🕐 Actualizat: **{{ as_timestamp(state_attr('sensor.benzina_standard_95_bucuresti', 'updated_at')) | timestamp_custom('%d %b %Y %H:%M') }}**

  # ===== PRETURI PE SCURT =====
  - type: glance
    title: "💰 Prețuri minime azi"
    show_state: true
    show_name: true
    entities:
      - entity: sensor.benzina_standard_95_bucuresti
        name: "Benzină 95"
        icon: mdi:fuel
      - entity: sensor.motorina_standard_bucuresti
        name: "Motorină"
        icon: mdi:fuel-pump
      - entity: sensor.gpl_auto_bucuresti
        name: "GPL"
        icon: mdi:fire
      - entity: sensor.benzina_premium_98_100_bucuresti
        name: "Benzină 98/100"
        icon: mdi:fuel
      - entity: sensor.motorina_premium_bucuresti
        name: "Motorină Premium"
        icon: mdi:fuel-pump

  # ===== CEA MAI IEFTINA STATIE =====
  - type: entities
    title: "🏆 Cea mai ieftină stație"
    show_header_toggle: false
    entities:
      - entity: sensor.cea_mai_ieftina_statie_bucuresti
        name: "Stație"
        secondary_info:
          attribute: address
        icon: mdi:trophy

  # ===== TOP 5 STATII =====
  - type: markdown
    content: >-
      ### 🏅 Top 5 cele mai ieftine stații

      {% set stations = state_attr('sensor.cea_mai_ieftina_statie_bucuresti', 'top_10') %}
      {% if stations %}
      {% for s in stations[:5] %}
      **{{ s.rank }}. {{ s.name }}**
      📍 {{ s.address }}
      ⛽ {{ s.benzina_95 or '—' }} lei | 🛢️ {{ s.motorina or '—' }} lei | 🔥 {{ s.gpl or '—' }} lei

      {% endfor %}
      {% else %}
      *Nu sunt date disponibile*
      {% endif %}

  # ===== COMPARATIE RETELE =====
  - type: markdown
    content: >-
      ### 📈 Comparație pe rețele

      {% set networks = state_attr('sensor.retele_carburanti_bucuresti', 'networks') %}
      {% if networks %}
      | Rețea | Stații | Benzină 95 | Motorină | GPL |
      |-------|--------|------------|----------|-----|
      {% for n in networks %}
      | **{{ n.name }}** | {{ n.stations }} | {{ n.benzina_95 or '—' }} lei | {{ n.motorina or '—' }} lei | {{ n.gpl or '—' }} lei |
      {% endfor %}
      {% endif %}

  # ===== COST PLIN 50L =====
  - type: markdown
    content: >-
      ### 💵 Cost plin 50L

      | Carburant | Preț/L | Cost 50L |
      |-----------|--------|----------|
      | **Benzină 95** | {{ states('sensor.benzina_standard_95_bucuresti') }} lei | **{{ (states('sensor.benzina_standard_95_bucuresti') | float * 50) | round(0) }} lei** |
      | **Motorină** | {{ states('sensor.motorina_standard_bucuresti') }} lei | **{{ (states('sensor.motorina_standard_bucuresti') | float * 50) | round(0) }} lei** |
      | **GPL** | {{ states('sensor.gpl_auto_bucuresti') }} lei | **{{ (states('sensor.gpl_auto_bucuresti') | float * 50) | round(0) }} lei** |
      | **Benzină Premium** | {{ states('sensor.benzina_premium_98_100_bucuresti') }} lei | **{{ (states('sensor.benzina_premium_98_100_bucuresti') | float * 50) | round(0) }} lei** |
      | **Motorină Premium** | {{ states('sensor.motorina_premium_bucuresti') }} lei | **{{ (states('sensor.motorina_premium_bucuresti') | float * 50) | round(0) }} lei** |

      ---

      💡 **Economie cu GPL:** {{ ((states('sensor.benzina_standard_95_bucuresti') | float) - (states('sensor.gpl_auto_bucuresti') | float)) * 50 | round(0) }} lei per plin de 50L

  # ===== DETALII PRETURI =====
  - type: entities
    title: "📋 Detalii prețuri"
    show_header_toggle: false
    entities:
      - type: attribute
        entity: sensor.benzina_standard_95_bucuresti
        attribute: min_price
        name: "⛽ Benzină 95 — Minim"
        suffix: " lei/L"
      - type: attribute
        entity: sensor.benzina_standard_95_bucuresti
        attribute: avg_price
        name: "⛽ Benzină 95 — Mediu"
        suffix: " lei/L"
      - type: attribute
        entity: sensor.benzina_standard_95_bucuresti
        attribute: cheapest_station
        name: "⛽ Benzină 95 — Stație minim"
      - type: divider
      - type: attribute
        entity: sensor.motorina_standard_bucuresti
        attribute: min_price
        name: "🛢️ Motorină — Minim"
        suffix: " lei/L"
      - type: attribute
        entity: sensor.motorina_standard_bucuresti
        attribute: avg_price
        name: "🛢️ Motorină — Mediu"
        suffix: " lei/L"
      - type: attribute
        entity: sensor.motorina_standard_bucuresti
        attribute: cheapest_station
        name: "🛢️ Motorină — Stație minim"
      - type: divider
      - type: attribute
        entity: sensor.gpl_auto_bucuresti
        attribute: min_price
        name: "🔥 GPL — Minim"
        suffix: " lei/L"
      - type: attribute
        entity: sensor.gpl_auto_bucuresti
        attribute: avg_price
        name: "🔥 GPL — Mediu"
        suffix: " lei/L"
      - type: attribute
        entity: sensor.gpl_auto_bucuresti
        attribute: cheapest_station
        name: "🔥 GPL — Stație minim"
      - type: divider
      - type: attribute
        entity: sensor.benzina_premium_98_100_bucuresti
        attribute: min_price
        name: "⭐ Benzină Premium — Minim"
        suffix: " lei/L"
      - type: attribute
        entity: sensor.benzina_premium_98_100_bucuresti
        attribute: avg_price
        name: "⭐ Benzină Premium — Mediu"
        suffix: " lei/L"
      - type: attribute
        entity: sensor.motorina_premium_bucuresti
        attribute: min_price
        name: "⭐ Motorină Premium — Minim"
        suffix: " lei/L"
      - type: attribute
        entity: sensor.motorina_premium_bucuresti
        attribute: avg_price
        name: "⭐ Motorină Premium — Mediu"
        suffix: " lei/L"
