type: vertical-stack
cards:
  # ===== HEADER =====
  - type: markdown
    content: >-
      # ⛽ Preț Carburant Argeș

      ---
      🏪 **{{ state_attr('sensor.benzina_standard_95_arges', 'station_count') }}** benzinării monitorizate
      | 🕐 Actualizat: **{{ as_timestamp(state_attr('sensor.benzina_standard_95_arges', 'updated_at')) | timestamp_custom('%d %b %Y %H:%M') }}**

  # ===== FUEL PRICES =====
  - type: entities
    title: "💰 Prețuri minime azi"
    show_header_toggle: false
    entities:
      - entity: sensor.benzina_standard_95_arges
        name: "⛽ Benzină Standard 95"
        secondary_info:
          attribute: cheapest_station
        icon: mdi:fuel
      - entity: sensor.motorina_standard_arges
        name: "🛢️ Motorină Standard"
        secondary_info:
          attribute: cheapest_station
        icon: mdi:fuel-pump
      - entity: sensor.gpl_auto_arges
        name: "🔥 GPL Auto"
        secondary_info:
          attribute: cheapest_station
        icon: mdi:fire
      - entity: sensor.benzina_premium_98_100_arges
        name: "⛽ Benzină Premium 98/100"
        secondary_info:
          attribute: cheapest_station
        icon: mdi:fuel
      - entity: sensor.motorina_premium_arges
        name: "🛢️ Motorină Premium"
        secondary_info:
          attribute: cheapest_station
        icon: mdi:fuel-pump

  # ===== CHEAPEST STATION =====
  - type: entities
    title: "🏆 Cea mai ieftină stație"
    show_header_toggle: false
    entities:
      - entity: sensor.cea_mai_ieftina_statie_arges
        name: "Stație"
        secondary_info:
          attribute: address
        icon: mdi:trophy

  # ===== PRICE DETAILS (Markdown) =====
  - type: markdown
    content: >-
      ### 📊 Detalii prețuri

      {% set benzina = state_attr('sensor.benzina_standard_95_arges', 'min_price') %}
      {% set benzina_avg = state_attr('sensor.benzina_standard_95_arges', 'avg_price') %}
      {% set motorina = state_attr('sensor.motorina_standard_arges', 'min_price') %}
      {% set motorina_avg = state_attr('sensor.motorina_standard_arges', 'avg_price') %}
      {% set gpl = state_attr('sensor.gpl_auto_arges', 'min_price') %}
      {% set gpl_avg = state_attr('sensor.gpl_auto_arges', 'avg_price') %}

      | Carburant | Minim | Mediu | Diferență |
      |-----------|-------|-------|-----------|
      | **Benzină 95** | {{ benzina }} lei | {{ benzina_avg }} lei | {{ (benzina_avg - benzina) | round(2) }} lei |
      | **Motorină** | {{ motorina }} lei | {{ motorina_avg }} lei | {{ (motorina_avg - motorina) | round(2) }} lei |
      | **GPL** | {{ gpl }} lei | {{ gpl_avg }} lei | {{ (gpl_avg - gpl) | round(2) }} lei |

      ---

      ### 🏅 Top 10 cele mai ieftine stații

      {% set stations = state_attr('sensor.cea_mai_ieftina_statie_arges', 'top_10') %}
      {% if stations %}
      | # | Stație | Adresă | Benzină 95 | Motorină | GPL |
      |---|--------|--------|------------|----------|-----|
      {% for s in stations %}
      | {{ s.rank }} | **{{ s.name }}** | {{ s.address }} | {{ s.benzina_95 or '—' }} lei | {{ s.motorina or '—' }} lei | {{ s.gpl or '—' }} lei |
      {% endfor %}
      {% endif %}

      ---

      ### 📈 Comparație pe rețele

      {% set networks = state_attr('sensor.retele_carburanti_arges', 'networks') %}
      {% if networks %}
      | Rețea | Stații | Benzină 95 | Motorină | GPL |
      |-------|--------|------------|----------|-----|
      {% for n in networks %}
      | **{{ n.name }}** | {{ n.stations }} | {{ n.benzina_95 or '—' }} lei | {{ n.motorina or '—' }} lei | {{ n.gpl or '—' }} lei |
      {% endfor %}
      {% endif %}

  # ===== COST CALCULATOR =====
  - type: markdown
    content: >-
      ### 💵 Cost plin 50L

      | Carburant | Preț/L | Cost 50L |
      |-----------|--------|----------|
      | **Benzină 95** | {{ states('sensor.benzina_standard_95_arges') }} lei | **{{ (states('sensor.benzina_standard_95_arges') | float * 50) | round(0) }} lei** |
      | **Motorină** | {{ states('sensor.motorina_standard_arges') }} lei | **{{ (states('sensor.motorina_standard_arges') | float * 50) | round(0) }} lei** |
      | **GPL** | {{ states('sensor.gpl_auto_arges') }} lei | **{{ (states('sensor.gpl_auto_arges') | float * 50) | round(0) }} lei** |

      💡 **Economie cu GPL:** {{ ((states('sensor.benzina_standard_95_arges') | float) - (states('sensor.gpl_auto_arges') | float)) * 50 | round(0) }} lei per plin de 50L
